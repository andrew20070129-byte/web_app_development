{% extends "base.html" %}

{% block title %}首頁 - 線上算命系統{% endblock %}

{% block content %}
<div class="row align-items-center py-5">
    <div class="col-lg-6 text-center text-lg-start mb-5 mb-lg-0">
        <h1 class="display-3 fw-bold mb-4">尋找人生的<br><span class="text-warning">正確方向</span></h1>
        <p class="lead mb-4 text-light opacity-75">
            無論是感情、事業、還是人生的十字路口，透過傳統的求籤儀式，讓神明給予您最真實的指引。心誠則靈，現在就開始屬於你的專屬線上算命體驗！
        </p>
        <div class="d-grid gap-3 d-sm-flex justify-content-sm-center justify-content-lg-start">
            <a href="{{ url_for('main.draw_fortune') }}" class="btn btn-premium btn-lg px-4 gap-3">馬上開始求籤</a>
            {% if not session.get('user_id') %}
            <a href="{{ url_for('auth.register') }}" class="btn btn-outline-light btn-lg px-4">註冊保留紀錄</a>
            {% endif %}
        </div>
    </div>
    <div class="col-lg-6 text-center">
        <!-- Using a placeholder glass panel for decoration -->
        <div class="glass-panel text-center p-5 mx-auto" style="max-width: 400px; transform: rotate(2deg);">
            <h2 class="display-1 mb-3">🥠</h2>
            <h3 class="fw-bold">每日一籤</h3>
            <p class="opacity-75">登入系統，讓每一天的迷惘都有神明相伴，解開心中的糾結。</p>
        </div>
    </div>
</div>
{% endblock %}
