{% extends "base.html" %}
{% block title %}求籤問卜 - 線上算命系統{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center py-5 text-center">
    <div class="col-lg-8">
        <h1 class="fw-bold mb-4">線上求籤儀式</h1>
        <p class="lead opacity-75 mb-5">請在心中默念您的姓名、出生年月日以及所求之事，專心致志後點擊擲筊。</p>
        
        <div class="glass-panel mx-auto px-4 py-5" style="max-width: 500px;" id="fortuneContainer">
            <h1 class="display-1 mb-4" id="divinationIcon">🥠</h1>
            <h3 class="mb-4" id="divinationText">心誠則靈，開始擲筊</h3>
            
            <form action="{{ url_for('main.draw_fortune') }}" method="POST" id="drawForm">
                <button type="button" class="btn btn-premium btn-lg px-5 fs-4" id="btnDraw" onclick="animateAndSubmit()">擲筊求籤</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function animateAndSubmit() {
        const icon = document.getElementById('divinationIcon');
        const text = document.getElementById('divinationText');
        const btn = document.getElementById('btnDraw');
        const form = document.getElementById('drawForm');
        
        // Hide button to prevent multiple clicks
        btn.style.display = 'none';
        
        // Play CSS Shake animation on the Icon
        icon.classList.add('animate-shake');
        text.innerHTML = '正在與神明溝通中... <br><small class="opacity-75">擲出聖筊即可得籤！</small>';
        
        // Wait for visual effect to finish, then actually submit POST request
        setTimeout(() => {
            form.submit();
        }, 1200);
    }
</script>
{% endblock %}
