{% extends "base.html" %}
{% block title %}註冊帳號 - 線上算命系統{% endblock %}
{% block content %}
<div class="row justify-content-center pt-5">
    <div class="col-md-6 col-lg-5">
        <div class="glass-panel">
            <h2 class="fw-bold text-center mb-4">建立專屬帳號</h2>
            <p class="text-center opacity-75 mb-4">註冊後即可永久保留您的求籤紀錄，隨時回顧神明的指引。</p>
            <form action="{{ url_for('auth.register') }}" method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label text-light">帳號名稱</label>
                    <input type="text" class="form-control" id="username" name="username" required placeholder="設定獨特的帳號">
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label text-light">電子信箱</label>
                    <input type="email" class="form-control" id="email" name="email" required placeholder="your@email.com">
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label text-light">密碼</label>
                    <input type="password" class="form-control" id="password" name="password" required placeholder="至少 6 位長度密碼">
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-premium py-2 text-dark fs-5">確認註冊</button>
                </div>
            </form>
            <div class="text-center mt-4 text-white-50">
                已經有帳號了嗎？ <a href="{{ url_for('auth.login') }}" class="text-warning text-decoration-none">直接登入</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
