{% extends "base.html" %}
{% block title %}會員登入 - 線上算命系統{% endblock %}
{% block content %}
<div class="row justify-content-center pt-5">
    <div class="col-md-6 col-lg-5">
        <div class="glass-panel">
            <h2 class="fw-bold text-center mb-4">會員登入</h2>
            <!-- 表單導向 auth.login -->
            <form action="{{ url_for('auth.login') }}" method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label text-light">帳號名稱</label>
                    <input type="text" class="form-control" id="username" name="username" required placeholder="輸入您的帳號">
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label text-light">密碼</label>
                    <input type="password" class="form-control" id="password" name="password" required placeholder="輸入您的密碼">
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-premium py-2 text-dark fs-5">登入系統</button>
                </div>
            </form>
            <div class="text-center mt-4 text-white-50">
                還沒有帳號嗎？ <a href="{{ url_for('auth.register') }}" class="text-warning text-decoration-none">立即註冊</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
